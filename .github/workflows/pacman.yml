name: Generate Pacman Game

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Generates the pacman game from your contribution graph
      - name: Generate Pacman SVG
        uses: lowlighter/metrics@latest
        with:
          filename: github-contribution-grid-snake.svg # Generates compatibility
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # If you are using the specific 'pacman-contribution-graph' action:
          # Note: The block below uses the standard community pacman generator.
      
      - name: Generate Pacman Contribution
        uses: jasonlong/github-contribution-calendar-to-snake@v1.1.0
        with:
          github_user_name: ${{ github.repository_owner }}
          # This action defaults to outputs at the root or dist/
          
      # This step pushes the generated SVGs to your 'output' branch
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
